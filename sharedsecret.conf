Listen *:3001
LoadModule remoteip_module modules/mod_remoteip.so

Header 						always set Strict-Transport-Security "max-age=15768000; includeSubDomains; preload"

Protocols 					h2 h2c http/1.1
ProtocolsHonorOrder 		On
H2Push 						On
H2EarlyHints 				On
H2PushResource 				On

LoadModule 					brotli_module modules/mod_brotli.so
Header 						append Vary User-Agent
BrotliCompressionQuality 	2
AddOutputFilterByType 		BROTLI_COMPRESS text/html text/plain text/xml text/css text/javascript application/x-javascript application/atom+xml application/javascript application/json application/ld+json application/manifest+json application/rss+xml application/vnd.geo+json application/vnd.ms-fontobject application/x-font-ttf application/x-web-app-manifest+json application/xhtml+xml application/xml font/opentype image/bmp image/svg+xml image/x-icon text/cache-manifest text/css text/plain text/vcard text/vnd.rim.location.xloc text/vtt text/x-component text/x-cross-domain-policy

<VirtualHost *:3001>
	RemoteIPHeader 				X-Forwarded-For
	ServerName 					secret.nemelit.com
	DocumentRoot 				/var/sharedsecret/html
	DirectoryIndex 				index.php
	LogLevel 					Warn
	ErrorLog					/var/sharedsecret/log/error.log
	CustomLog					/var/sharedsecret/log/access.log combined
	
	<Directory /var/sharedsecret/html>
		Options 					+Includes -Multiviews +FollowSymLinks -Indexes
		AllowOverride 				All
		Order 						Deny,Allow
		Allow 						from all
		Require 					all granted
		
		RewriteEngine 				On
		FileETag 					None
		
		<IfModule mod_headers.c>
			Header unset ETag
			Header set Cache-Control "max-age=0, no-cache, no-store, must-revalidate"
			Header set Pragma "no-cache"
			Header set Expires "0"
			
			Header always set Content-Security-Policy "default-src 'self' 'unsafe-inline';"
		</IfModule>
		
		
		
	</Directory>
	
</VirtualHost>
